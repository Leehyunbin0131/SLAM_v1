motor_controller:
  ros__parameters:
    device_port: "/dev/dynamixel"
    baudrate: 57600
    left_motor_id: 1
    right_motor_id: 2
    # If +linear.x drives backward, swap these to -1 / 1.
    left_motor_sign: 1
    right_motor_sign: -1
    wheel_radius: 0.026
    wheel_separation: 0.12
    publish_odom: true
    odom_frame: "odom"
    base_frame: "base_footprint"
    cmd_vel_timeout: 0.5
